<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de libros</title>
  <link rel="stylesheet" href="styles/styles.css"

  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">
  <div class="container">
    <h2 class="text-center text-primary mb-4">📚 Registros de Libros</h2>

    <!-- Formulario de creación -->
    <form id="crearLibros" onsubmit="agregarLibro(); return false" class="row g-3 mb-4">
      <div class="col-md-6">
        <input type="text" id="titulo" class="form-control" placeholder="Título del libro" required />
      </div>
      <div class="col-md-6">
        <input type="text" id="autor" class="form-control" placeholder="Autor del libro" required />
      </div>
      <div class="col-md-4">
        <input type="number" id="anio" class="form-control" placeholder="Año de publicación" min="1900" max="2025" required />
      </div>
      <div class="col-md-4">
        <input type="text" id="genero" class="form-control" placeholder="Género" required />
      </div>
      <div class="col-md-4">
        <button type="submit" class="btn btn-success w-100">Agregar libro</button>
      </div>
      <div class="col-md-4">
        <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="leido">
            <label class="form-check-label" for="leido">¿Leído?</label>
        </div>
      </div>

    </form>

    <!-- Filtro por estado de lectura -->
    <div class="mb-4">
    <h4>📖 Filtrar por lectura</h4>
    <select id="filtroLectura" class="form-select" onchange="filtrarPorLectura()">
        <option value="todos">Todos</option>
        <option value="leidos">Solo leídos</option>
        <option value="no-leidos">Solo no leídos</option>
    </select>
    </div>


    <!-- Filtro por texto -->
    <div class="mb-4">
      <h4>🔍 Filtrar libros</h4>
      <input type="text" id="busqueda" class="form-control" placeholder="Buscar título..." oninput="filtrarLibros()">
    </div>

    <!-- Filtro por género -->
    <div class="mb-4">
      <h4>🎯 Filtrar por género</h4>
      <select id="filtroGenero" class="form-select" onchange="filtrarPorGenero()">
        <option value="todas">Todas</option>
      </select>
    </div>

    <!-- Botón ordenar -->
    <div class="mb-4">
      <button onclick="ordenarPorAnio()" class="btn btn-primary">Ordenar por año</button>
    </div>

    <!-- Tabla -->
    <div class="table-responsive mb-4">
      <table class="table table-bordered table-striped" id="tablaLibros">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Año</th>
            <th>Género</th>
            <th>Acciones</th>
            <th>Leído</th>

          </tr>
        </thead>
        <tbody>
          <!-- Aquí se agregan filas dinámicamente -->
        </tbody>
      </table>
    </div>

    <!-- Resumen -->
    <h4>📊 Resumen de libros</h4>
    <div id="resumenLibros" class="border rounded p-3 bg-white shadow-sm"></div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Tu script JS -->
  <script src="./js/libros.js"></script>
</body>
</html>
